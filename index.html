<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Candy Crush Special Candy Combos</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <h1>Candy Crush: Special Candy Combos</h1>
        <p id="status-line">Press Enter to start.</p>
        <div class="stats">
          <span id="score">Score: 0</span>
          <span id="combo">Combo: x1</span>
          <span id="moves">Moves: 0</span>
          <span id="time">Time: 120.0s</span>
        </div>
        <div class="controls">
          <button id="restart-button" type="button">Restart (R)</button>
          <button id="pause-button" type="button">Pause/Resume (P)</button>
          <button id="reset-button" type="button">Hard Reset (Shift+R)</button>
        </div>
      </header>
      <section id="board" class="board" aria-label="Game board" role="grid"></section>
      <footer class="legend">
        <p>Match 3+ candies by swapping adjacent tiles. Build 4+ matches to spawn striped specials.</p>
      </footer>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
